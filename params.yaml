# ============================================================
# params.yaml – Parâmetros biológicos do experimento
# Edite este arquivo para cada experimento.
# Parâmetros técnicos (cpus, memória) ficam em nextflow.config.
# ============================================================

# ── Genoma de referência ─────────────────────────────────────
genome_fasta: "/home/eulalio/RNA-Seq-Arabidopsis/Athaliana_genome.fa"
genome_gff3:  "/home/eulalio/RNA-Seq-Arabidopsis/Athaliana_annot.gff3"
genome_gtf:   ""            # deixar vazio para converter do GFF3 automaticamente
genome_index: ""            # deixar vazio para construir automaticamente

# ── Amostras ──────────────────────────────────────────────────
samplesheet: "samplesheet.csv"

# ── Contraste ─────────────────────────────────────────────────
# IMPORTANTE: sem hífens nos nomes de grupo (quebra fórmula R ~condition)
control_group:   "ColWT"
treatment_group: "BP12"

# ── Qualidade / Trimagem ──────────────────────────────────────
min_length: 36
quality:    20

# ── Quantificação ─────────────────────────────────────────────
feature_type: "exon"
gene_attr:    "gene_id"
strandedness: 0            # 0=unstranded | 1=stranded | 2=reversely-stranded

# ── Análise estatística ───────────────────────────────────────
padj_cutoff:   0.05
lfc_cutoff:    1.0

# ── Anotação funcional – Arabidopsis thaliana ─────────────────
kegg_organism: "ath"       # código KEGG para A. thaliana

# ── rMATS (splicing alternativo) ──────────────────────────────
read_length: 100

# ── Relatório ─────────────────────────────────────────────────
report_title:  "RNASeq Insight – Arabidopsis thaliana TAIR10"
report_author: "Eulalio Santos – UFV"

# ── Output ────────────────────────────────────────────────────
outdir: "results"
