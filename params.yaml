# ============================================================
# params.yaml – Parâmetros biológicos do experimento
# Edite este arquivo para cada experimento.
# Parâmetros técnicos (cpus, memória) ficam em nextflow.config.
# ============================================================

# ── Genoma de referência ─────────────────────────────────────
genome_fasta: "/home/eulalio/RNA-Seq-Arabidopsis/Athaliana_genome.fa"
genome_gff3:  "/home/eulalio/RNA-Seq-Arabidopsis/Athaliana_annot.gff3"
genome_gtf:   ""            # deixar vazio para converter do GFF3 automaticamente
genome_index: ""            # deixar vazio para construir automaticamente

# ── Amostras ──────────────────────────────────────────────────
samplesheet: "samplesheet.csv"

# ── Contraste ─────────────────────────────────────────────────
# IMPORTANTE: sem hífens nos nomes de grupo (quebra fórmula R ~condition)
control_group:   "ColWT"
treatment_group: "BP12"

# ── Qualidade / Trimagem ──────────────────────────────────────
min_length: 36
quality:    20

# ── Alinhador principal ───────────────────────────────────────
aligner: "star"             # star (recomendado, 2.7.11b) | hisat2 (legado)

# ── Quantificação ─────────────────────────────────────────────
feature_type: "exon"
gene_attr:    "gene_id"
strandedness: 0             # 0=unstranded | 1=stranded | 2=reversely-stranded

# ── Salmon (pseudoalinhamento paralelo) ───────────────────────
run_salmon: true            # Roda Salmon em paralelo; compara DEGs com featureCounts

# ── Correção de batch (ComBat-Seq) ────────────────────────────
run_combat_seq: true        # Detecta automaticamente; aplica só se PC1>40% + cor>0.7
# Adicione coluna "batch" no samplesheet.csv para ativar detecção

# ── Montagem de transcritos (StringTie) – Fase 2 ──────────────
run_stringtie: false        # Ativar para identificar transcritos e isoformas novos

# ── Fase 3 ────────────────────────────────────────────────────
run_ml:  true               # Machine Learning (RF + SVM + ElasticNet)
run_ppi: true               # Rede PPI via STRING (requer internet no servidor)
# PlantTFDB: deixar vazio para download automático, ou fornecer path local
# Download manual: http://planttfdb.gao-lab.org/download.php → Ath_TF_list.txt.gz
plantfdb_file: ""
# GENIE3 – rede regulatória gene→TF
genie3_trees: 500           # número de árvores por gene (500 = rápido, 1000 = preciso)
genie3_links: 5000          # top N links a reportar

# ── Análise estatística ───────────────────────────────────────
padj_cutoff:   0.05
lfc_cutoff:    1.0

# ── Anotação funcional – Arabidopsis thaliana ─────────────────
kegg_organism: "ath"       # código KEGG para A. thaliana

# ── rMATS (splicing alternativo) ──────────────────────────────
read_length: 100

# ── Relatório ─────────────────────────────────────────────────
report_title:  "RNASeq Insight – Arabidopsis thaliana TAIR10"
report_author: "Eulalio Santos – UFV"

# ── Output ────────────────────────────────────────────────────
outdir: "results"
